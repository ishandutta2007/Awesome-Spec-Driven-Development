<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgb(255,255,0);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(255,0,0);stop-opacity:1" />
      <animate attributeName="x1" values="0%;100%;0%" dur="5s" repeatCount="indefinite" />
      <animate attributeName="x2" values="100%;0%;100%" dur="5s" repeatCount="indefinite" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#grad1)" rx="15" />
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Arial" font-size="40" fill="white" font-weight="bold">Awesome Spec-Driven Development</text>
  <circle cx="100" cy="100" r="20" fill="white">
    <animate attributeName="cy" values="100;80;100" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>